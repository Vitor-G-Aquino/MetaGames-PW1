<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="stylesheet" href="figura3-CSS.css"> 
    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
    <title>MetaGames - Sempre o melhor preço para sua jogatina</title> 
    <meta charset="utf-8"> 
</head>
<body>
    <div id="cabecalho">
        <!--cabeçalho - parte da esquerda-->
        <h1 class="logo">MetaGames</h1>
        <!--cabeçalho - parte do centro-->
        <form method="post">
            <input type="text" placeholder="Pesquise sua próxima experiência" id="pesquisa">
            <button>
                <ion-icon id="search_icon" name="search-outline"></ion-icon>
            </button>
        </form>
        <!--cabeçalho - parte da direita-->
        <div id="c_right">
            <button>
                <a href="figura3-HTML.html">
                    <ion-icon class="icon" name="person-circle-sharp"></ion-icon>
                </a>
            </button>
            <button>
                <a href="figura4-HTML.html">
                    <ion-icon class="icon" name="cart"></ion-icon>
                </a>
            </button>
        </div>
    </div>
    
    <div id="login_cadastro">
        <div class="ruler">
            <!--Já tenho cadastro-->
            <div class="cadastro">
            <h1 id="texta">Já tenho cadastro</h1>
            <form action="" method="">
                <p>Email:</p>
                <label for="email"></label>
                <input id="email" type="email">

                <p>Senha:</p>
                <label for="Senha"></label>
                <input id="Senha" type="password">
                
                <p></p>
                <button type="submit">Enviar</button>
            <!--google e facebook-->
                <h1 id="textb"> Entrar com sua conta do google ou Facebook</h1>
                <div class="container">  
                    <button id="g" type="submit"><ion-icon id="a" name="logo-google"></ion-icon></button>

                    <button id="f" type="submit"><ion-icon id="b" name="logo-facebook"></ion-icon></button>
                </div> 
            </div>
            </form>
            <!--não tenho cadastro-->
            <div class="criar ">
                <h1>Não tenho cadastro</h1>
                <form action="" method="">
                    <p>Email:</p>
                    <label for="email"></label>
                    <input id="email" type="email">

                    <p>Senha:</p>
                    <label for="number"></label>
                    <input id="number" type="password">

                    <p>CPF:</p>
                    <label for="CPF"></label>
                    <input id="CPF" type="text">

                    <p>Nome:</p>
                    <label for="NOME"></label>
                    <input id="nome" type="text">

                    <p>Nascimento:</p>
                    <label for="Nascimento"></label>
                    <input id="Nascimento" type="date">
                    
                    <p>Sexo:</p>
                    <label for="genero">Masculino</label>
                    <input id="genero" name="sexo" type="radio">

                    <label for="genero">Feminino</label>
                    <input id="genero" name="sexo" type="radio">

                    <p>Telefone:</p>
                    <label for="tele"></label>
                    <input id="tele" type="text">

                    <p></p>
                    <button type="submit">Cadastarar</button>
                </form>
            </div>
        </div>
    </div>

    <div id="rodape">
        <!--rodapé - parte da esquerda-->
        <div id="rod_left">
            <h2 id="rod_h2">Formas de Pagamento</h2>
            <button>
                <img class="icon" src="https://raw.githubusercontent.com/danilocbueno/web1/main/footer/cartoes/visa.png" alt="cartão_visa">
            </button>
            <button>
                <img class="icon" src="https://raw.githubusercontent.com/danilocbueno/web1/main/footer/cartoes/mastercard.png" alt="cartão_mastercard">
            </button>
            <button>
                <img class="icon" src="https://raw.githubusercontent.com/danilocbueno/web1/main/footer/cartoes/paypal.png" alt="paypal">
            </button>
            <button>
                <img class="icon" src="https://raw.githubusercontent.com/danilocbueno/web1/main/footer/cartoes/maestro.png" alt="cartão_maestro">
            </button> 
            <h1 class="logo">MetaGames</h1>
        </div>
        <!--rodapé - parte do centro-->
        <div id="rod_center">
            <a href="" class="rod_link">Sobre</a>
            <a href="figura6-HTML.html" class="rod_link">Quem Somos</a>
            <a href="figura7-HTML.html" class="rod_link">Administração</a>
        </div>
        <!--rodapé - parte da direita-->
        <div id="rod_right">
            <div id="redes_sociais">
                <button>
                    <ion-icon class="icon" name="logo-facebook"></ion-icon>
                </button>
                <button>
                    <ion-icon class="icon" name="logo-instagram"></ion-icon>
                </button>
                <button>
                    <ion-icon class="icon" name="logo-twitter"></ion-icon>
                </button>
            </div>
            <h2 id="rod_h2">Visite nossas redes sociais</h2>
        </div>
    </div>
</body>
</html>
